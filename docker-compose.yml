version: '3.8'

services:
  web:
    build:
      context: .          # 使用當前目錄的 Dockerfile
      dockerfile: Dockerfile
    image: flask-feature-one
    container_name: flask-container
    ports:
      - "80:5000"         # 主機 80 port → 容器 5000 port
    environment:
      MYSQL_HOST:     mysql.clki101   # Container 內連到 MySQL container
      MYSQL_PORT:     3306
      MYSQL_USER:     root
      MYSQL_PASSWORD: Roger1126
      MYSQL_DATABASE: cki101
    depends_on:
      mysql:
        condition: service_healthy  # 等 MySQL healthcheck 通過才啟動 Flask
    restart: always

  mysql:
    image: mysql:8.4
    container_name: mysql.clki101
    ports:
      - "8625:3306"       # 主機 8625 port → 容器 3306 port
    environment:
      MYSQL_ROOT_PASSWORD: Roger1126
      MYSQL_DATABASE: cki101
    volumes:
      - ./db_data:/var/lib/mysql  # 資料持久化到專案資料夾的 db_data
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pRoger1126"]
      interval: 5s    # 每 5 秒檢查一次
      timeout: 5s     # 逾時 5 秒
      retries: 10     # 最多重試 10 次
      start_period: 10s  # 啟動後等 10 秒再開始檢查
    restart: always

